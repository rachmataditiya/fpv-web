server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # /assets holds BOTH hashed bundles and verbatim public files (.hdr/.jpg/.bsp)
  # → a day of caching, not immutable.
  location /assets/ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # Server map folders: maps/<name>/{one .bsp, any .wads}. autoindex JSON lets
  # the app discover folders with zero manifests — just drop files and reload.
  location /maps/ {
    alias /maps/;
    autoindex on;
    autoindex_format json;
    add_header Cache-Control "public, max-age=300";
    add_header Access-Control-Allow-Origin "*";
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
